<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>คำนวณต้นทุน</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <span class="dot dot-accent"></span>
    <h1>คำนวณต้นทุน</h1>
  </header>

  <main class="content">

    <!-- เฟส 1: คลังวัตถุดิบ -->
    <section id="page-materials" class="page active">
      <h2>เพิ่มวัตถุดิบ</h2>
      <form id="material-form" class="card">
        <label for="mat-name">ชื่อวัตถุดิบ</label>
        <input list="material-names" id="mat-name" placeholder="เช่น ลูกปัด1" required>
        <datalist id="material-names"></datalist>

        <div class="form-row">
          <div class="form-col">
            <label for="mat-price">ราคาที่ซื้อรวม (บาท)</label>
            <input type="number" id="mat-price" min="0" step="0.01" placeholder="50" required>
          </div>
          <div class="form-col">
            <label for="mat-qty">จำนวนที่ได้</label>
            <input type="number" id="mat-qty" min="0.001" step="0.001" placeholder="25" required>
          </div>
        </div>

        <label for="mat-unit">หน่วย</label>
        <input id="mat-unit" placeholder="ชิ้น" value="ชิ้น">

        <p id="mat-preview" class="preview"></p>
        <p id="mat-error" class="error-text"></p>

        <button type="submit">บันทึก</button>
      </form>

      <h2>รายการวัตถุดิบ</h2>
      <div id="materials-list"></div>
    </section>

    <!-- เฟสถัดไป -->
    <section id="page-products" class="page placeholder">
      <div class="coming-soon">
        <p>หน้าสูตรต้นทุนสินค้า</p>
        <p class="muted">จะมาในเฟสถัดไป</p>
      </div>
    </section>

    <section id="page-production" class="page placeholder">
      <div class="coming-soon">
        <p>หน้าผลิต / สต๊อก</p>
        <p class="muted">จะมาในเฟสถัดไป</p>
      </div>
    </section>

    <section id="page-pos" class="page placeholder">
      <div class="coming-soon">
        <p>หน้าขาย (POS)</p>
        <p class="muted">จะมาในเฟสถัดไป</p>
      </div>
    </section>

    <section id="page-summary" class="page placeholder">
      <div class="coming-soon">
        <p>หน้าสรุปยอดตามเจ้าของ</p>
        <p class="muted">จะมาในเฟสถัดไป</p>
      </div>
    </section>

  </main>

  <nav class="bottom-nav">
    <button class="nav-item active" data-page="materials"><span class="dot dot-accent"></span>วัตถุดิบ</button>
    <button class="nav-item" data-page="products"><span class="dot dot-muted"></span>สูตรสินค้า</button>
    <button class="nav-item" data-page="production"><span class="dot dot-muted"></span>ผลิต</button>
    <button class="nav-item" data-page="pos"><span class="dot dot-muted"></span>ขาย</button>
    <button class="nav-item" data-page="summary"><span class="dot dot-muted"></span>สรุป</button>
  </nav>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
